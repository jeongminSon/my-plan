# Netlify 배포 설정 — Expo 웹(정적)

[build]
  command = "npm run build:web"
  publish = "dist"

# 공개 클라이언트 값(구글 OAuth 클라이언트 ID, Supabase anon 키)은 비밀이 아니라
# 클라이언트에 내장된다. Netlify 비밀 스캐너가 오탐하지 않도록 스캔에서 제외한다.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID,EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID,GOOGLE_ALLOWED_AUDIENCES,EXPO_PUBLIC_SUPABASE_URL,EXPO_PUBLIC_SUPABASE_ANON_KEY"

# SPA 라우팅: 모든 경로를 index.html로
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 보안 응답 헤더
# - CSP: 스크립트는 self만(번들 외 인라인 스크립트 없음). 스타일은 react-native-web의
#   런타임 인라인 스타일 때문에 'unsafe-inline' 필요. connect-src에 Supabase(REST/Realtime)
#   + Google OAuth 허용. frame-ancestors 'none'으로 클릭재킹 차단.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://bvyzneijqpjjsqjtkzxg.supabase.co wss://bvyzneijqpjjsqjtkzxg.supabase.co https://accounts.google.com; frame-src https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"
